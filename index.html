<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Radio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="radio-container">
        <div class="cd-tray">
            <div class="cd-slot">
                <div class="cd-slot-disc" id="cd-slot-disc"></div>
                <div class="cd-slot-led" id="cd-slot-led"></div>
            </div>
            <div class="tray-label">CD IN</div>
        </div>
        <header>
            <div class="screen">
                <div class="screen-top">
                    <span id="band-display">FM</span>
                    <span id="freq-display">87.5</span>
                    <div class="signal-bars" id="signal-bars">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
                <div class="status-label">NOW PLAYING</div>
                <h2 id="now-playing">NO SIGNAL</h2>
                <div class="screen-bottom">
                    <span id="track-time">0:00</span>
                    <span id="source-indicator">TUNER</span>
                    <button id="user-btn" class="user-btn" title="Sign in">👤</button>
                </div>
            </div>
        </header>
        
        <!-- Auth Modal -->
        <div class="auth-overlay" id="auth-overlay">
            <div class="auth-modal">
                <div class="auth-modal-header">ACCOUNT</div>
                <div id="auth-content">
                    <p>Sign in to sync presets to the cloud.</p>
                    <button id="google-signin-btn" class="auth-btn google-btn">Sign in with Google</button>
                </div>
                <div id="user-content" style="display:none">
                    <div class="user-info">
                        <img id="user-avatar" class="user-avatar" src="" alt="">
                        <span id="user-email"></span>
                    </div>
                    <button id="signout-btn" class="auth-btn signout-btn">Sign Out</button>
                    <div class="sync-status" id="sync-status">✓ Cloud sync active</div>
                </div>
                <button class="auth-close" id="auth-close">✕</button>
            </div>
        </div>

        <div class="presets-container">
            <button class="phys-button preset" data-index="0">1</button>
            <button class="phys-button preset" data-index="1">2</button>
            <button class="phys-button preset" data-index="2">3</button>
            <button class="phys-button preset" data-index="3">4</button>
            <button class="phys-button preset" data-index="4">5</button>
            <button class="phys-button preset" data-index="5">6</button>
        </div>

        <div class="controls-main">
            <button id="prev-btn" class="phys-button">◀◀</button>
            <button id="search-btn" class="phys-button search-btn">🔍</button>
            <button id="play-pause-btn" class="phys-button play-btn">▶</button>
            <button id="next-btn" class="phys-button">▶▶</button>
        </div>

        <!-- Search Modal -->
        <div class="search-overlay" id="search-overlay">
            <div class="search-modal">
                <div class="search-modal-header">STATION SEARCH</div>
                <input type="text" id="search-input" class="search-input" placeholder="Search station name..." autofocus>
                <div class="search-results" id="search-results">
                    <div class="search-hint">Type a station name to search</div>
                </div>
                <button class="auth-close search-close" id="search-close">✕</button>
            </div>
        </div>

        <div class="deck-container">
            <div class="volume-container">
                <div id="volume-knob" class="knob"></div>
                <label>VOL</label>
            </div>
            
            <div class="cd-deck" id="cd-deck">
                <div class="cd-disc" id="cd-disc">
                    <div class="cd-label">CD</div>
                </div>
                <input type="file" id="cd-input" accept="audio/*">
                <label for="cd-input" class="phys-button cd-btn">EJECT / LOAD</label>
            </div>
        </div>
        
        <audio id="audio-player"></audio>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
